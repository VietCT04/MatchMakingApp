version: "3.9"
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sports_matchmaking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sports_matchmaking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
